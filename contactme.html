<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aldi Alfiandiansyah</title>
    <link rel="stylesheet" href="contactme.css">


</head>

<body>
    <!-- Header -->
    <div class="header">
        <!-- Button Back -->
        <a href="index.html">
            <img src="images/back.svg" class="back" alt="Back">
        </a>
    </div>
    <!-- Konten contact me -->
    <div class="contact">
        <script src="https://kit.fontawesome.com/2f4d6596db.js" crossorigin="anonymous"></script>
        <div class="container">
            <div class="row">
                <div class="contact-left">
                    <h1 class="sub-tittle">Contact Me</h1>
                    <p><i class="fa-solid fa-paper-plane"></i>aldialfiandiansyah5701@gmail.com</p>
                    <P><i class="fa-solid fa-phone"></i>+6281252885058</P>
                    <div class="social-icons">
                        <a href="http://facebook.com/alfiandiansyah"><i class="fa-brands fa-facebook"></i></i></a>
                        <a href="http://instagram.com/aldialfiandiansya"><i class="fab fa-instagram"></i></a>
                        <a href="http://linkedin.com/in/aldialfiandiansyah"><i class="fab fa-linkedin"></i></a>
                    </div>
                    <a href="images/Aldi Alfiandiansyah.pdf" download>
                        <button type="button" class="btn-primary">Download CV</button>
                    </a>
                </div>

                <div class="contact-right">
                    <form name="submit-to-google-sheet">
                        <input type="text" name="Name" placeholder="Your Name">
                        <input type="email" name="Email" placeholder="Your Email">
                        <textarea name="Message" rows="6" placeholder="Your Message"></textarea>
                        <button type="submit" class="btn-primary">Submit</button>
                    </form>
                    <script>
                        const scriptURL = 'https://script.google.com/macros/s/AKfycbzFEvvlM5zLX2YdB_qpgC3FrwXU1bSgAq9Wyv6n0a5MIR_tkSEpIxdGmdZe_SoOjEZg/exec'
                        const form = document.forms['submit-to-google-sheet']

                        form.addEventListener('submit', e => {
                            e.preventDefault()
                            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                                .then(response => console.log('Success!', response))
                                .catch(error => console.error('Error!', error.message))
                        })
                    </script>
                </div>
            </div>
        </div>

</body>

</html>
